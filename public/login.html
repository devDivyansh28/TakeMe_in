<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakeMe In - Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Core Theme: Sumi-ink Dark Mode */
            --sumi-dark: #1A1A1A;
            --sumi-light: #434343;
            --fuji-white: #EAEAEA;
            --torii-red: #BA4731;
            --torii-red-hover: #9c3b28;
            
            /* Glassmorphic Bento Variables */
            --glass-bg: rgba(67, 67, 67, 0.15);
            --glass-border: rgba(234, 234, 234, 0.06);
            --washi-alpha: 0.05;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--sumi-dark);
            color: var(--fuji-white);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Japanese Typography Utility */
        .jp-text {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.9em; /* 10% smaller rule */
            line-height: 1.6;
            opacity: 0.6;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        /* Procedural Ambient Background */
        .ambient-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--sumi-dark);
        }

        .ambient-water {
            position: absolute;
            inset: -50%;
            background: conic-gradient(from 90deg at 50% 50%, var(--sumi-dark) 0%, var(--sumi-light) 25%, var(--sumi-dark) 50%, var(--sumi-light) 75%, var(--sumi-dark) 100%);
            filter: blur(120px);
            animation: slow-flow 45s linear infinite;
            opacity: 0.25;
        }

        @keyframes slow-flow {
            100% { transform: rotate(360deg); }
        }

        .ambient-washi {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: var(--washi-alpha);
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        /* Bento Grid Container */
        .engawa-threshold {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1100px;
            height: 75vh;
            min-height: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 2px; /* Extremely minimal radius */
            display: flex;
            box-shadow: 0 30px 60px rgba(26, 26, 26, 0.8);
        }

        /* Left Side: Utility Pane (Kanso/Clutter-free) */
        .utility-pane {
            flex: 0 0 420px;
            padding: 4rem 3.5rem;
            display: flex;
            flex-direction: column;
            background: rgba(26, 26, 26, 0.4);
            position: relative;
        }

        /* Right Side: Immersive High-Art Nature */
        .nature-pane {
            flex: 1;
            position: relative;
            border-left: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .nature-image {
            position: absolute;
            inset: 0;
            /* High-art abstract zen stone / water image */
            background: url('https://images.unsplash.com/photo-1528360983277-13d401cdc186?q=80&w=2070&auto=format&fit=crop') center/cover;
            filter: grayscale(85%) contrast(120%) brightness(30%);
            transition: filter 2.5s cubic-bezier(0.16, 1, 0.3, 1), transform 15s ease-out;
            transform: scale(1.05);
        }

        .nature-pane:hover .nature-image {
            filter: grayscale(40%) contrast(110%) brightness(50%);
            transform: scale(1);
        }

        /* Header Aesthetics */
        .header {
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: var(--fuji-white);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .logo-dot {
            color: var(--torii-red);
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--fuji-white);
            opacity: 0.6;
            font-weight: 300;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
        }

        /* Bento Toggle Tabs */
        .toggle-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .toggle-btn {
            flex: 1;
            padding: 0.5rem 0;
            background: transparent;
            border: none;
            color: var(--fuji-white);
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.4s ease;
            position: relative;
            text-align: left;
        }

        .toggle-btn.active {
            opacity: 1;
        }

        /* Brush Stroke Animation */
        .toggle-btn::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 1px;
            background: var(--torii-red);
            transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toggle-btn.active::after,
        .toggle-btn:hover::after {
            width: 100%;
        }

        /* Form Wrapper & Sections */
        .forms-wrapper {
            position: relative;
            flex: 1;
        }

        .form-section {
            position: absolute;
            top: 0; left: 0; right: 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-section.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            position: relative;
        }

        .form-section.exit {
            transform: translateY(-10px);
            opacity: 0;
            visibility: hidden;
            position: absolute;
        }

        /* Input Styling (Minimalist Materiality) */
        .input-group {
            margin-bottom: 2rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--fuji-white);
            opacity: 0.5;
            transition: opacity 0.3s ease, color 0.3s ease;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(234, 234, 234, 0.15);
            padding: 0.5rem 0;
            color: var(--fuji-white);
            font-size: 1rem;
            font-family: 'Inter', monospace;
            transition: border-color 0.4s ease;
            outline: none;
        }

        .input-group input::placeholder {
            color: rgba(234, 234, 234, 0.2);
        }

        .input-group input:focus {
            border-bottom-color: var(--torii-red);
        }

        .input-group input:focus + label {
            color: var(--torii-red);
            opacity: 1;
        }

        /* Quiet Glow Submit Button */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 1px solid rgba(234, 234, 234, 0.15);
            color: var(--fuji-white);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            border-color: var(--torii-red);
            color: var(--torii-red);
            box-shadow: 0 0 20px rgba(186, 71, 49, 0.15); /* Quiet glow */
            background: rgba(186, 71, 49, 0.05);
        }

        .btn-submit.loading {
            color: transparent;
            pointer-events: none;
        }

        .btn-submit.loading::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            top: calc(50% - 8px);
            left: calc(50% - 8px);
            border: 1px solid var(--torii-red);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notifications (Minimalist) */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .toast {
            background: var(--sumi-dark);
            border: 1px solid var(--glass-border);
            color: var(--fuji-white);
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            box-shadow: 0 15px 30px rgba(26, 26, 26, 0.9);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
            max-width: 380px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.hide {
            transform: translateY(20px);
            opacity: 0;
        }

        .toast-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .toast.error .toast-icon { color: var(--torii-red); }
        .toast.success .toast-icon { color: var(--success); }

        .toast-content { flex: 1; }

        .toast-title {
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .toast-message {
            font-size: 0.8rem;
            color: var(--fuji-white);
            opacity: 0.6;
            line-height: 1.5;
            font-weight: 300;
        }

        .toast-close {
            background: transparent;
            border: none;
            color: var(--fuji-white);
            opacity: 0.4;
            cursor: pointer;
            padding: 0;
            transition: opacity 0.3s ease;
        }

        .toast-close:hover { opacity: 1; }

        /* Responsive */
        @media (max-width: 900px) {
            .engawa-threshold {
                flex-direction: column;
                height: auto;
                min-height: 85vh;
            }
            .nature-pane {
                display: none; /* Emphasize Kanso on small screens */
            }
            .utility-pane {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-layer">
        <div class="ambient-water"></div>
        <div class="ambient-washi"></div>
    </div>

    <div class="engawa-threshold">
        <!-- Utility Pane (Left) -->
        <div class="utility-pane">
            <div class="header">
                <h1 class="logo">
                    TakeMe In<span class="logo-dot">.</span>
                    <span class="jp-text">入り口</span>
                </h1>
                <p class="subtitle">
                    Secure workspace
                    <span class="jp-text">安全なアクセス</span>
                </p>
            </div>

            <div class="toggle-container">
                <button class="toggle-btn active" id="btnLoginToggle" onclick="switchTab('login')">Login <span class="jp-text">ログイン</span></button>
                <button class="toggle-btn" id="btnRegisterToggle" onclick="switchTab('register')">Register <span class="jp-text">登録</span></button>
            </div>

            <div class="forms-wrapper">
                <!-- Login Form -->
                <form id="loginForm" class="form-section active" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <input type="email" id="loginEmail" required placeholder="name@example.com">
                        <label for="loginEmail">Email Address</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="loginPassword" required placeholder="••••••••" 
                               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                               oninput="handlePasswordInput(event)">
                        <label for="loginPassword">Password</label>
                    </div>
                    <button type="submit" class="btn-submit" id="loginSubmitBtn">Sign In</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="form-section" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <input type="text" id="registerName" required placeholder="John Doe">
                        <label for="registerName">Full Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" id="registerEmail" required placeholder="name@example.com">
                        <label for="registerEmail">Email Address</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="registerPassword" required placeholder="••••••••" 
                               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                               oninput="handlePasswordInput(event)">
                        <label for="registerPassword">Password</label>
                    </div>
                    <button type="submit" class="btn-submit" id="registerSubmitBtn">Create Account</button>
                </form>
            </div>
        </div>

        <!-- Nature Visual Pane (Right) -->
        <div class="nature-pane">
            <div class="nature-image"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Bento Tab Switching Logic
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const btnLogin = document.getElementById('btnLoginToggle');
            const btnRegister = document.getElementById('btnRegisterToggle');

            if (tab === 'login') {
                btnLogin.classList.add('active');
                btnRegister.classList.remove('active');
                
                registerForm.classList.remove('active');
                registerForm.classList.add('exit');
                
                setTimeout(() => {
                    loginForm.classList.remove('exit');
                    loginForm.classList.add('active');
                }, 50);
                
            } else {
                btnRegister.classList.add('active');
                btnLogin.classList.remove('active');
                
                loginForm.classList.remove('active');
                loginForm.classList.add('exit');
                
                setTimeout(() => {
                    registerForm.classList.remove('exit');
                    registerForm.classList.add('active');
                }, 50);
            }
        }

        // Shibui Password Masking Logic
        const actualPasswords = {
            loginPassword: '',
            registerPassword: ''
        };
        const maskTimeouts = {};

        function handlePasswordInput(e) {
            const el = e.target;
            const id = el.id;
            const val = el.value;
            const oldActual = actualPasswords[id] || '';
            
            let newActual = '';
            for (let i = 0; i < val.length; i++) {
                if (val[i] === '•') {
                    newActual += oldActual[i] !== undefined ? oldActual[i] : '';
                } else {
                    newActual += val[i];
                }
            }
            actualPasswords[id] = newActual;
            
            let displayVal = '';
            for (let i = 0; i < newActual.length; i++) {
                if (i === newActual.length - 1 && val[val.length - 1] !== '•') {
                    displayVal += newActual[i]; 
                } else {
                    displayVal += '•';
                }
            }
            
            const cursor = el.selectionStart;
            el.value = displayVal;
            el.setSelectionRange(cursor, cursor); 
            
            clearTimeout(maskTimeouts[id]);
            maskTimeouts[id] = setTimeout(() => {
                let fullyMasked = '';
                for (let i = 0; i < actualPasswords[id].length; i++) fullyMasked += '•';
                const c = el.selectionStart;
                el.value = fullyMasked;
                el.setSelectionRange(c, c);
            }, 600);
        }

        // Minimalist Toast Notification System
        function showToast(title, message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const iconSvg = type === 'error' 
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`
                : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;

            toast.innerHTML = `
                <div class="toast-icon">
                    ${iconSvg}
                </div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            `;

            container.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);

            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 500);
            }, 6000);
        }

        // Handle Login
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginSubmitBtn');
            const email = document.getElementById('loginEmail').value;
            const password = actualPasswords.loginPassword;

            if (!password) {
                showToast('Error', 'Please enter your password', 'error');
                return;
            }

            try {
                btn.classList.add('loading');
                
                const response = await fetch('/takemein/oidc/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.redirected) {
                    window.location.href = response.url;
                    return;
                }

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.message || 'Invalid email or password');
                }

                const data = await response.json();
                showToast('Success', 'Authentication successful', 'success');
                
                if (data.redirectUrl) {
                    window.location.href = data.redirectUrl;
                }

            } catch (err) {
                showToast('Authentication Failed', err.message, 'error');
            } finally {
                btn.classList.remove('loading');
            }
        }

        // Handle Register
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerSubmitBtn');
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = actualPasswords.registerPassword;

            if (!password) {
                showToast('Error', 'Please enter a password', 'error');
                return;
            }

            try {
                btn.classList.add('loading');
                
                const response = await fetch('/takemein/oidc/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role: 'user' })
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(data.message || 'Registration failed. Please verify your information.');
                }

                showToast('Success', data.message || 'Registration complete. Please log in.', 'success');
                
                e.target.reset();
                actualPasswords.registerPassword = '';
                document.getElementById('registerPassword').value = '';
                setTimeout(() => switchTab('login'), 1500);

            } catch (err) {
                showToast('Registration Failed', err.message, 'error');
            } finally {
                btn.classList.remove('loading');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (window.location.pathname.includes('register')) {
                switchTab('register');
            } else {
                switchTab('login');
            }
        });
    </script>
</body>
</html>
